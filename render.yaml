services:
  - type: web
    name: momentum
    runtime: python
    buildCommand: "pip install --upgrade pip setuptools wheel && pip install openai-whisper --no-build-isolation && pip install -r requirements.txt"
    startCommand: "uvicorn app:app --host 0.0.0.0 --port $PORT --workers 1"
    envVars:
      - key: DEPLOYMENT_MODE
        value: lite
      - key: WHISPER_MODEL
        value: tiny
      - key: MAX_FILE_SIZE_MB
        value: 500
      - key: PYTHON_VERSION
        value: 3.11.9